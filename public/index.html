<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport meta = the page scales correctly on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WVAMA Pdf Creator</title>
    <!-- Site favicon (the WV logo). Drop the logo file in public/favicon.png. -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <!-- Montserrat: the client's brand font (headings + body); swap keeps text
         visible while it loads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>WVAMA Pdf Creator</h1>
      <p class="subtitle">
        Upload your images below and select Create PDF. They’ll be standardized,
        compressed, and combined into one PDF for you.
      </p>

      <!-- The whole label is a big tap target. The real <input> is hidden but
           still does the work — clicking the label opens the file picker.
           accept lets phones offer the camera roll AND show HEIC files. -->
      <label class="dropzone" id="dropzone">
        <input
          type="file"
          id="fileInput"
          name="images"
          multiple
          accept="image/*,.jpg,.jpeg,.png,.heic,.heif,.webp,.tiff,.tif,.gif,.avif"
          hidden
        />
        <!-- Upload icon (inline SVG so it always matches the theme color). -->
        <svg
          class="dropzone-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M12 15V3" />
          <path d="m7 8 5-5 5 5" />
          <path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4" />
        </svg>
        <span class="dropzone-title">Click to upload or drag and drop</span>
        <span class="dropzone-formats">JPG, PNG, HEIC, WebP, TIFF, GIF, or AVIF</span>
      </label>

      <p class="helper">
        You can add as many images as you like. Photos straight from your phone are fine.
      </p>

      <!-- A live list of what the user picked. -->
      <ul id="fileList" class="file-list"></ul>

      <button id="convertBtn" class="btn" disabled>Create PDF</button>
      <button id="clearBtn" class="btn-clear" disabled>Clear all</button>

      <!-- Status / error messages appear here. aria-live = screen readers
           announce updates. -->
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
